# ViTPose-B COCO-17 keypoints (ONNX Runtime inference, no mmpose dependency)
#
# Download the ONNX export:
#   pip install huggingface_hub
#   python -c "from huggingface_hub import hf_hub_download; \
#              hf_hub_download('julien-c/vitpose', 'vitpose-b-coco.onnx', \
#              local_dir='models/vitpose')"
# Or convert from the official PyTorch checkpoint:
#   https://github.com/ViTAE-Transformer/ViTPose
name: ViTPose-B
checkpoint: models/vitpose/vitpose-b-coco.onnx

# Crop size fed to the model — ViTPose-B standard: W=192, H=256
input_w: 192
input_h: 256

# Fraction of bbox to add as padding before cropping (SimpleBaseline convention)
padding: 1.25

# Keypoints below this SAM/OKS-proxy confidence are treated as absent
conf_threshold: 0.3

# 1€ smoothing of keypoints per global_id before ControlNet (ADR-0014).
# Velocity-adaptive low-pass: low cutoff on stationary joints (de-jitter),
# high cutoff on fast motion (responsive). Default off; flip on after
# validation-clip eyeball confirms no over-smoothing on rapid head turns.
smoother:
  enabled: false
  min_cutoff: 1.0      # baseline cutoff frequency (Hz, with dt in frames)
  beta: 0.007          # velocity gain — higher = more responsive on fast motion
  d_cutoff: 1.0        # derivative-channel cutoff
  conf_floor: 0.3      # below this confidence, emit prior smoothed prediction
  gap_reset_frames: 30 # cold-start after this many frames absent for a gid
